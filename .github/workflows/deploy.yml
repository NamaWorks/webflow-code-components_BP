name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Test and deploy to Webflow
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Cypress
        run: pnpm cypress:run

      - name: Deploy to Webflow
        run: npx webflow library share --no-input --api-token ${{ secrets.WEBFLOW_WORKSPACE_API_TOKEN }}
